# precision_head_topic_ref_100c_wdh 配置文件示例
# 使用方法: python precision_head_topic_ref_100c_wdh.py config.toml

[data]
# 基础目录路径
basefold = "/mnt/d/dockers/rt/rtk_pvt/eva/2026/vcpb_tc-20260414/vcpb_tc/20251216/2025-12-16_10-55-44"
# 参考数据文件路径
reffile = "/mnt/d/dockers/rt/rtk/20251216/ref_02.txt"
# LC版本名称 (默认: 空)
lcver = "rtklc_vcpb"
# TC版本名称 (默认: 空)
tcver = "rtktc_vcpb"
# 数据集名称 (默认: 空)
dataset = ""
# 时间偏移 (默认: 0)
dt = 0.0

# GNSS数据路径配置
# GNSS数据子目录 (默认: "topic_parse")
gnss_subdir = "topic_parse"
# GNSS数据文件名 (默认: "pvt.csv")
gnss_filename = "gnss.csv"

# GNSS数据列索引配置
# 用于指定GNSS输入文件中位置相关的列索引（用于填充gnssindex中的索引7、8、9位置）
# gnss_pos_index_1: 对应gnssindex[7]，默认为2（经度）
# gnss_pos_index_2: 对应gnssindex[8]，默认为3（纬度）
# gnss_pos_index_3: 对应gnssindex[9]，默认为4（高度）
gnss_pos_index_1 = 12
gnss_pos_index_2 = 13
gnss_pos_index_3 = 4

# 数据源标识符配置 (用于绘图和统计中的标签)
lc_label = "LC"
tc_label = "TC"
gnss_label = "RTK"

[plot]
# 是否绘制LC数据
plotlc = true
# 是否绘制TC数据
plottc = true
# 是否绘制GNSS数据
plotgnssstat = true

[evaluation]
# 时间阈值
tthreshod = 0.001
horizontal_only = 0

[detail_plot]
# 水平误差阈值（米），超过此值将自动绘制子图
horizontal_error_threshold_meters = 10.0
# 高程误差阈值（米），超过此值将自动绘制子图
vertical_error_threshold_meters = 15.0
# 子图时间窗口（秒），在极值点前后各取的时间长度
detail_window_seconds = 25.0

[clip_plot]
# 是否保存和绘制clip数据（1=启用，0=禁用）
saveclip = 1
# 水平误差阈值（米），超过此值的数据将被保存为clip
horizontal_error_threshold_meters = 10.0
# 垂直误差阈值（米），超过此值的数据将被保存为clip
vertical_error_threshold_meters = 15.0
# clip子图时间间隔（秒）
clip_plot_interval_seconds = 50.0

[normal_scene_exclusions]
# 正常场景需要排除的场景配置
# 这些场景标签必须与time_ranges.type_config中的type_label完全匹配（包括大小写）

# LC/TC正常场景需要排除的场景列表
lc_tc_exclude = ["隧道"]

# GNSS正常场景需要排除的场景列表
gnss_exclude = ["隧道", "转发器"]

[output]
# 输出目录 (默认为basefold，如果为空字符串则使用basefold)
output_dir = "/mnt/d/dockers/rt/rtk_pvt/eva/2026/vcpb_tc-20260414/vcpb_tc/20251216/2025-12-16_10-55-44"

[advanced]
# 参考真值的数据类型
# 0: 2504月采集的真值
# 1: 后续wdh处理的真值
reftype = 1
# 状态文件的类型
# 0: tcmsf_sol.csv
# 1: msf_debug_state.csv
statetype = 1

# Type 0: 20260105
[[time_ranges.type_config]]
type_label = "All"
type_time_range = [[-1,397150]]  #后小段真值有问题

# Type 1: 20251209
[[time_ranges.type_config]]
type_label = "开阔场景"
type_time_range = [[-1,392986],[393312,393511],[393795,393944],[394053,394120],[394458,394559],[395385,395445],[395473,395858],[396037,396471],[397117,397150]]

# Type 2: 20251205
[[time_ranges.type_config]]
type_label = "半遮挡"
type_time_range = [[392986,393312],[394152,394290],[395858,396037]]

# Type 3: 20251217
[[time_ranges.type_config]]
type_label = "双边遮挡"
type_time_range = [[393511,393795],[393944,394053],[394120,394152],[394290,394458],[394559,395385],[395445,395473],[396471,397117]]

# Type 4: 20251217
[[time_ranges.type_config]]
type_label = "隧道"
type_time_range = []

# Type 5: 20260105
[[time_ranges.type_config]]
type_label = "转发器"
type_time_range = []
